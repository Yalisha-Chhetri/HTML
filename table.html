<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in HTML</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>SN</th>
                <th>Name</th>
                <th>Particular</th>
                <th>Price</th>
                <th>Categories</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Monitor</td>
                <td>Dell Monitor</td>
                <td rowspan="2">Electronics</td>
                 <td>NRP. 19,500</td>
            </tr>
            <tr>
                <td>2</td>
                <td>CPU</td>
                <td>Dell CPU</td>
                <td>NPR.56000</td>
            </tr>
            <tr>
                <td colspan="4"> Total</td>
                <td>NPR. 456000</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
